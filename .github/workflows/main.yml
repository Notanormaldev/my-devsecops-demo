name: SecureFlow DevSecOps Pipeline
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  secret_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  detect_technology:
    needs: secret_scan
    runs-on: ubuntu-latest
    outputs:
      project_type: ${{ steps.detect.outputs.project_type }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        run: |
          if [ -f "requirements.txt" ]; then echo "project_type=python" >> $GITHUB_OUTPUT
          elif [ -f "package.json" ]; then echo "project_type=node" >> $GITHUB_OUTPUT
          elif [ -f "pom.xml" ]; then echo "project_type=java" >> $GITHUB_OUTPUT
          elif [ -f "index.html" ]; then echo "project_type=static" >> $GITHUB_OUTPUT
          else echo "project_type=unknown" >> $GITHUB_OUTPUT; fi
  dependency_scan:
    needs: detect_technology
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - if: needs.detect_technology.outputs.project_type == 'node'
        run: npm audit || true
      - if: needs.detect_technology.outputs.project_type == 'python'
        run: pip install safety && safety check || true
  static_security_scan:
    needs: dependency_scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - if: needs.detect_technology.outputs.project_type == 'python'
        run: pip install bandit && bandit -r .
  verify_files:
    needs: static_security_scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          if [ -f index.html ]; then echo "found"; fi
          if [ -f style.css ]; then echo "found"; fi
          if [ -f script.js ]; then echo "found"; fi
  validation:
    needs: verify_files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ls -la
  test:
    needs: validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: grep "<html>" index.html || true
  setup_pages:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v4
  upload:
    needs: setup_pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
  deploy:
    needs: upload
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
